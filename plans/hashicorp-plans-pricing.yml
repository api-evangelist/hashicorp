specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: HashiCorp
providerId: hashicorp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud
  - DevOps
  - Infrastructure
  - Platform
description: HashiCorp products are commercialized primarily through HashiCorp Cloud Platform (HCP)
  with per-resource pay-as-you-go pricing on Terraform (Essentials / Standard / Premium) plus
  custom-priced Terraform Enterprise (self-managed) and HCP Terraform Europe. Other product lines
  (Vault, Consul, Boundary, Packer, Waypoint, Nomad) ship as community open-source plus HCP managed
  or Enterprise self-managed editions; pricing for those is published on each product's pricing page
  or quoted by sales. New customers receive a $500 platform credit. See `hcp/` for HCP-specific
  plans.
sources:
  - https://www.hashicorp.com/en/products/terraform/pricing
plans:
  - id: hashicorp-community
    name: Community / Open Source
    type: freemium
    description: Self-hosted open-source editions of HashiCorp products (Terraform, Vault, Consul,
      Nomad, Boundary, Packer, Vagrant, Waypoint) under MPL-2.0 / BSL.
    entries:
      - label: Plan price
        description: Open-source self-managed editions are no-cost
        name: plan_price
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Community Support
      - name: Open-source CLIs and providers
      - name: HashiCorp Vault
      - name: HashiCorp Terraform
      - name: HashiCorp Nomad
      - name: HashiCorp Consul
      - name: HashiCorp Boundary
      - name: HashiCorp Vagrant
  - id: hashicorp-hcp-terraform-essentials
    name: HCP Terraform — Essentials
    type: usage-based
    description: Pay-as-you-go HCP Terraform tier billed per managed resource. New customers receive
      a $500 platform credit.
    entries:
      - label: Per managed resource (monthly)
        description: Monthly rate per Terraform managed resource on Essentials
        name: managed_resource_month
        type: metered
        metric: resource
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.10/month per resource
        userMultiplied: false
      - label: Per managed resource (hourly)
        description: Hourly rate per Terraform managed resource on Essentials
        name: managed_resource_hour
        type: metered
        metric: resource
        limit: -1
        timeFrame: hour
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.00013/hour per resource
        userMultiplied: false
    elements:
      - name: HCP Terraform (managed)
      - name: Pay-as-you-go billing
      - name: $500 new-customer credit
  - id: hashicorp-hcp-terraform-standard
    name: HCP Terraform — Standard
    type: usage-based
    description: Per-resource pricing for enterprises standardizing infrastructure automation.
      Includes HCP Waypoint.
    entries:
      - label: Per managed resource (monthly)
        description: Monthly rate per Terraform managed resource on Standard
        name: managed_resource_month
        type: metered
        metric: resource
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.47/month per resource
        userMultiplied: false
      - label: Per managed resource (hourly)
        description: Hourly rate per Terraform managed resource on Standard
        name: managed_resource_hour
        type: metered
        metric: resource
        limit: -1
        timeFrame: hour
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.00064/hour per resource
        userMultiplied: false
    elements:
      - name: HCP Terraform (managed)
      - name: HCP Waypoint included
      - name: Pay-as-you-go billing
  - id: hashicorp-hcp-terraform-premium
    name: HCP Terraform — Premium
    type: usage-based
    description: Top-tier HCP Terraform pricing with all premium capabilities.
    entries:
      - label: Per managed resource (monthly)
        description: Monthly rate per Terraform managed resource on Premium
        name: managed_resource_month
        type: metered
        metric: resource
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.99/month per resource
        userMultiplied: false
      - label: Per managed resource (hourly)
        description: Hourly rate per Terraform managed resource on Premium
        name: managed_resource_hour
        type: metered
        metric: resource
        limit: -1
        timeFrame: hour
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.00135/hour per resource
        userMultiplied: false
    elements:
      - name: HCP Terraform (managed)
      - name: HCP Waypoint included
      - name: All Premium capabilities
  - id: hashicorp-terraform-enterprise
    name: Terraform Enterprise (self-managed)
    type: enterprise
    description: Self-managed Terraform Enterprise for organizations with security, compliance, or
      operational requirements that mandate on-prem deployment. Premium support included; pricing
      via sales.
    entries:
      - label: Plan price
        description: Custom-quoted by sales
        name: plan_price
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Self-managed deployment
      - name: Premium Support
      - name: Air-gapped option
      - name: HashiCorp Terraform
  - id: hashicorp-hcp-terraform-europe
    name: HCP Terraform Europe
    type: enterprise
    description: Cloud-based HCP Terraform with European data residency for regulated industries.
      Custom-priced via sales.
    entries:
      - label: Plan price
        description: Custom-quoted by sales
        name: plan_price
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: EU
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: EU data residency
      - name: HCP Terraform
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
