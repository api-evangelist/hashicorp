specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: HashiCorp
providerId: hashicorp
publisherName: HashiCorp, Inc. (an IBM company)
serviceCategory: Infrastructure / DevOps Platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud
  - DevOps
  - Infrastructure
  - Platform
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for HashiCorp: pay-as-you-go per-managed-resource billing on
  HCP Terraform (Essentials $0.10, Standard $0.47, Premium $0.99 per resource per month) plus
  custom-priced Enterprise (self-managed) and EU residency editions. Other product lines (Vault,
  Consul, Nomad, Boundary, Packer, Waypoint) bill per HCP product or via Enterprise license.'
sources:
  - https://www.hashicorp.com/en/products/terraform/pricing
  - https://developer.hashicorp.com/terraform/cloud-docs/api-docs
principles:
  - name: Visibility
    description: Use HCP Terraform's billing dashboard and the workspaces/managed-resources counts;
      tag workspaces by team / environment so consumption maps onto invoice lines.
  - name: Allocation
    description: Allocate HCP Terraform spend by Workspace and Project; map managed-resource counts
      back to consuming application teams via workspace tags.
  - name: Optimization
    description: Reduce managed-resource counts via state pruning, module consolidation, and
      ephemeral workspaces; choose the lowest tier (Essentials / Standard / Premium) that meets
      governance needs; redeem the $500 new-customer credit.
  - name: Accountability
    description: Assign a HashiCorp account owner; review Terraform managed-resource growth monthly
      against the Enterprise commitment or PAYG run-rate.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: HashiCorp
  ServiceCategory: Infrastructure / DevOps Platform
  ProviderName: HashiCorp
  PublisherName: HashiCorp, Inc. (an IBM company)
  InvoiceIssuerName: HashiCorp, Inc.
  PricingCategory: Pay-As-You-Go
  PricingUnit: managed-resource
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: terraform_managed_resources
    description: Count of Terraform-managed resources, billed monthly per the active HCP Terraform
      tier
    unit: resource-month
    aggregation: max
    dimensions:
      - tier
      - workspace
      - project
      - organization
  - name: terraform_managed_resource_hours
    description: Hourly metering of managed resources (alternative to monthly billing)
    unit: resource-hour
    aggregation: sum
    dimensions:
      - tier
      - workspace
      - organization
  - name: api_requests
    description: HCP Terraform API requests for cost allocation and abuse monitoring
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - user
      - workspace
  - name: hcp_credit_consumption
    description: Consumption of the $500 new-customer HCP credit
    unit: USD
    aggregation: sum
    dimensions:
      - product
  - name: enterprise_subscription
    description: Custom Enterprise (self-managed Terraform Enterprise / EU) subscription line
    unit: month
    aggregation: sum
    dimensions:
      - edition
      - region
apis:
  - name: HashiCorp Vault
    baseURL: ''
    tags:
