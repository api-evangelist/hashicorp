      - Security
    serviceName: HashiCorp Vault
    serviceCategory: API
  - name: HashiCorp Terraform
    baseURL: ''
    tags:
      - Infrastructure as Code
      - Provisioning
    serviceName: HashiCorp Terraform
    serviceCategory: API
  - name: HashiCorp Nomad
    baseURL: ''
    tags:
      - Orchestration
      - Scheduling
    serviceName: HashiCorp Nomad
    serviceCategory: API
  - name: HashiCorp Consul
    baseURL: ''
    tags:
      - Service Discovery
      - Service Mesh
    serviceName: HashiCorp Consul
    serviceCategory: API
  - name: HashiCorp Boundary
    baseURL: ''
    tags:
      - Access Management
      - Security
    serviceName: HashiCorp Boundary
    serviceCategory: API
  - name: HashiCorp Vagrant
    baseURL: ''
    tags:
      - Development Environments
      - Virtual Machines
    serviceName: HashiCorp Vagrant
    serviceCategory: API
unitEconomics:
  - name: Cost per Managed Resource
    metric: billed_cost / terraform_managed_resources
    target: TBD
  - name: Cost per Workspace
    metric: billed_cost / active_workspaces
    target: TBD
maintainers:
