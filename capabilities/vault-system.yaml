        method: POST
        description: HashiCorp Enables a new auth method.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletesysauthpath
        method: DELETE
